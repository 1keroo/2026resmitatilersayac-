<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Resmi Tatil Takvimi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97e;
    --gold-dark: #8a6d2f;
    --cream: #f5f0e8;
    --dark: #0d0b08;
    --dark2: #1a1710;
    --dark3: #252218;
    --text: #d4c9b0;
    --red: #c0392b;
    --accent: #e74c3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(201,168,76,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(192,57,43,0.05) 0%, transparent 60%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(201,168,76,0.015) 40px,
        rgba(201,168,76,0.015) 41px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 4rem 2rem 3rem;
    position: relative;
  }

  .header-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .ornament-line {
    flex: 1;
    max-width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .ornament-line.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .ornament-diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  h1 span {
    color: var(--gold);
  }

  .header-desc {
    font-size: 0.9rem;
    color: rgba(212,201,176,0.5);
    margin-top: 1rem;
    letter-spacing: 0.05em;
  }

  /* DATE INFO */
  .date-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    margin: 1.5rem 0 3rem;
    padding: 0.8rem 2rem;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: rgba(212,201,176,0.6);
  }

  .date-bar strong {
    color: var(--gold);
    font-weight: 500;
  }

  /* NOTE */
  .note-bar {
    text-align: center;
    font-size: 0.78rem;
    color: rgba(212,201,176,0.4);
    margin-bottom: 3rem;
    letter-spacing: 0.05em;
  }
  .note-bar span {
    color: var(--gold-dark);
    font-weight: 500;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1.5rem;
    padding-bottom: 5rem;
  }

  /* CARD */
  .card {
    background: linear-gradient(145deg, var(--dark2), var(--dark3));
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 2px;
    padding: 0;
    overflow: hidden;
    position: relative;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(201,168,76,0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(201,168,76,0.05);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card.passed {
    opacity: 0.45;
    filter: grayscale(60%);
  }

  .card.passed:hover {
    opacity: 0.6;
  }

  .card.today {
    border-color: var(--gold) !important;
    box-shadow: 0 0 40px rgba(201,168,76,0.15);
  }

  .card.today::before {
    opacity: 1;
  }

  /* Card top area */
  .card-top {
    padding: 1.5rem 1.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .card-number {
    font-family: 'Playfair Display', serif;
    font-size: 0.7rem;
    color: rgba(201,168,76,0.4);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .card-badge {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.25rem 0.6rem;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold);
    border-radius: 1px;
  }

  .card-badge.today-badge {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    animation: pulse 2s infinite;
  }

  .card-badge.passed-badge {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.08);
    color: rgba(212,201,176,0.3);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Card body */
  .card-body {
    padding: 0 1.5rem 1.5rem;
  }

  .holiday-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .holiday-date-str {
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.08em;
    margin-bottom: 1.2rem;
  }

  /* Countdown display */
  .countdown {
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
    margin-bottom: 1.2rem;
  }

  .count-box {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 1px;
    padding: 0.6rem 0.4rem 0.4rem;
    text-align: center;
  }

  .count-val {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
    margin-bottom: 0.2rem;
  }

  .count-label {
    display: block;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.4);
  }

  .count-sep {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: rgba(201,168,76,0.3);
    padding-bottom: 0.5rem;
  }

  /* Progress bar */
  .progress-wrap {
    position: relative;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: rgba(212,201,176,0.35);
    margin-bottom: 0.4rem;
    letter-spacing: 0.05em;
  }

  .progress-info span:last-child {
    color: rgba(201,168,76,0.5);
  }

  .progress-bar {
    height: 2px;
    background: rgba(201,168,76,0.08);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border-radius: 1px;
    transition: width 1s ease;
  }

  /* Divider */
  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
    margin: 1rem 1.5rem;
  }

  /* Work days note */
  .workdays-note {
    padding: 0 1.5rem 1.2rem;
    font-size: 0.7rem;
    color: rgba(201,168,76,0.5);
    letter-spacing: 0.05em;
  }

  .workdays-note strong {
    color: var(--gold);
    font-size: 1rem;
    font-family: 'Playfair Display', serif;
  }

  /* Past message */
  .passed-msg {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: rgba(212,201,176,0.3);
    padding: 0.5rem 0 0.5rem;
  }

  /* TODAY special glow */
  .card.today .count-val {
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.5);
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2.5rem 2rem;
    border-top: 1px solid rgba(201,168,76,0.08);
    font-size: 0.72rem;
    color: rgba(212,201,176,0.2);
    letter-spacing: 0.1em;
    position: relative;
    z-index: 1;
  }

  .footer-ig {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    margin-top: 1rem;
    padding: 0.55rem 1.2rem;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    text-decoration: none;
    color: var(--gold);
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    background: rgba(201,168,76,0.04);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .footer-ig::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s ease;
  }

  .footer-ig:hover::before {
    transform: translateX(100%);
  }

  .footer-ig:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
    color: var(--gold-light);
    transform: translateY(-2px);
  }

  .footer-ig svg {
    flex-shrink: 0;
    opacity: 0.85;
    transition: opacity 0.3s;
  }

  .footer-ig:hover svg {
    opacity: 1;
  }

  /* Entrance animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    animation: fadeUp 0.5s ease forwards;
    opacity: 0;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line right"></div>
    </div>
    <div class="subtitle">Cumhuriyet Takvimi</div>
    <h1>Resmi <span>Tatiller</span></h1>
    <p class="header-desc">Türkiye Cumhuriyeti Resmi Tatil Günleri • İş Günü Sayacı</p>
    <div class="date-bar">
      <span>Bugün: <strong id="today-str">—</strong></span>
      <div class="ornament-diamond" style="width:5px;height:5px;opacity:0.3"></div>
      <span>Gün: <strong id="today-day">—</strong></span>
    </div>
    <p class="note-bar"><span>★</span> Pazar günleri sayılmaz &nbsp;|&nbsp; Yalnızca Pazartesi–Cumartesi iş günleri hesaplanır</p>
  </header>

  <div class="grid" id="grid"></div>
</div>

<footer>
  <div>TÜRKİYE CUMHURİYETİ RESMİ TATİL TAKVİMİ &nbsp;•&nbsp; PAZARTESİ — CUMARTESİ</div>
  <div style="margin-top:0.4rem; color:rgba(212,201,176,0.12); font-size:0.65rem; letter-spacing:0.08em;">Yapımcı</div>
  <a href="https://instagram.com/1keremfly" target="_blank" class="footer-ig">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
    </svg>
    @1keremfly
  </a>
</footer>

<script>
const HOLIDAYS = [
  { name: "Yılbaşı",                  date: "2026-01-01", emoji: "🎆" },
  { name: "Ulusal Egemenlik ve\nÇocuk Bayramı", date: "2026-04-23", emoji: "🏛️" },
  { name: "Emek ve Dayanışma Günü",   date: "2026-05-01", emoji: "⚙️" },
  { name: "Atatürk'ü Anma, Gençlik\nve Spor Bayramı", date: "2026-05-19", emoji: "🏃" },
  { name: "Ramazan Bayramı (1. Gün)", date: "2026-03-20", emoji: "🌙" },
  { name: "Ramazan Bayramı (2. Gün)", date: "2026-03-21", emoji: "🌙" },
  { name: "Ramazan Bayramı (3. Gün)", date: "2026-03-22", emoji: "🌙" },
  { name: "Kurban Bayramı (1. Gün)",  date: "2026-05-27", emoji: "✨" },
  { name: "Kurban Bayramı (2. Gün)",  date: "2026-05-28", emoji: "✨" },
  { name: "Kurban Bayramı (3. Gün)",  date: "2026-05-29", emoji: "✨" },
  { name: "Kurban Bayramı (4. Gün)",  date: "2026-05-30", emoji: "✨" },
  { name: "Demokrasi ve Millî Birlik Günü", date: "2026-07-15", emoji: "🇹🇷" },
  { name: "Zafer Bayramı",            date: "2026-08-30", emoji: "⚔️" },
  { name: "Cumhuriyet Bayramı",       date: "2026-10-29", emoji: "🏛️" },
];

const DAYS_TR = ["Pazar","Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi"];
const MONTHS_TR = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

function todayLocal() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate());
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatDateTR(d) {
  return `${d.getDate()} ${MONTHS_TR[d.getMonth()]} ${d.getFullYear()}, ${DAYS_TR[d.getDay()]}`;
}

// Count days Mon-Sat between today (exclusive) and target (inclusive)
function workDaysUntil(today, target) {
  if (target <= today) return 0;
  let count = 0;
  let d = new Date(today);
  d.setDate(d.getDate() + 1);
  while (d <= target) {
    if (d.getDay() !== 0) count++; // skip Sunday
    d.setDate(d.getDate() + 1);
  }
  return count;
}

// Total calendar days between two dates
function calDaysUntil(today, target) {
  return Math.round((target - today) / 86400000);
}

function renderAll() {
  const today = todayLocal();
  document.getElementById('today-str').textContent = formatDateTR(today);
  document.getElementById('today-day').textContent = DAYS_TR[today.getDay()];

  // Sort by date
  const sorted = [...HOLIDAYS].sort((a, b) => parseDate(a.date) - parseDate(b.date));

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  sorted.forEach((h, idx) => {
    const target = parseDate(h.date);
    const calDays = calDaysUntil(today, target);
    const wDays = workDaysUntil(today, target);
    const passed = calDays < 0;
    const isToday = calDays === 0;

    // Time breakdown
    const absDays = Math.abs(calDays);
    const weeks = Math.floor(absDays / 7);
    const remDays = absDays % 7;

    // Progress: how far through the year
    const yearStart = new Date(today.getFullYear(), 0, 1);
    const yearEnd   = new Date(today.getFullYear(), 11, 31);
    const progress = Math.min(100, Math.max(0, ((today - yearStart) / (yearEnd - yearStart)) * 100));

    const card = document.createElement('div');
    card.className = 'card' + (passed ? ' passed' : '') + (isToday ? ' today' : '');
    card.style.animationDelay = `${idx * 0.06}s`;

    let badge = '';
    if (isToday) badge = `<div class="card-badge today-badge">BUGÜN</div>`;
    else if (passed) badge = `<div class="card-badge passed-badge">GEÇTİ</div>`;
    else badge = `<div class="card-badge">${wDays} İŞ GÜNÜ</div>`;

    let countdownHTML = '';
    if (isToday) {
      countdownHTML = `<div style="padding:0.8rem 0 1rem; font-family:'Playfair Display',serif; font-style:italic; font-size:1.2rem; color:var(--gold); text-shadow:0 0 20px rgba(201,168,76,0.4);">Bugün resmi tatil! 🎉</div>`;
    } else if (passed) {
      countdownHTML = `<div class="passed-msg">Bu tatil geride kaldı.</div>`;
    } else {
      countdownHTML = `
        <div class="countdown">
          <div class="count-box"><span class="count-val">${calDays}</span><span class="count-label">Gün</span></div>
          <div class="count-sep">·</div>
          <div class="count-box"><span class="count-val">${weeks}</span><span class="count-label">Hafta</span></div>
          <div class="count-sep">·</div>
          <div class="count-box"><span class="count-val">${remDays}</span><span class="count-label">+Gün</span></div>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-top">
        <div class="card-number">NO. ${String(idx+1).padStart(2,'0')}</div>
        ${badge}
      </div>
      <div class="card-body">
        <div class="holiday-name">${h.name.replace('\n','<br>')}</div>
        <div class="holiday-date-str">${formatDateTR(target)}</div>
        ${countdownHTML}
        ${!passed && !isToday ? `
        <div class="progress-wrap">
          <div class="progress-info">
            <span>Yılın İlerleyişi</span>
            <span>${Math.round(progress)}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        </div>` : ''}
      </div>
      ${!passed && !isToday ? `
      <div class="card-divider"></div>
      <div class="workdays-note">
        <strong>${wDays}</strong> iş günü kaldı &nbsp;(Pazar hariç)
      </div>` : ''}
    `;

    grid.appendChild(card);
  });
}

renderAll();

// Update every minute
setInterval(() => {
  const cards = document.querySelectorAll('.card');
  cards.forEach(c => { c.style.animation = 'none'; });
  renderAll();
}, 60000);
</script>
</body>
</html>
